name: Deploy docs

# Build the fumadocs site in docs/ and publish it to GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      # Derives base_path from the Pages URL (e.g. "/yori" for a project
      # site). Pages is enabled for this repo with build_type: workflow.
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - run: pnpm install --frozen-lockfile

      - name: Build static export
        run: pnpm build
        env:
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      # Actions deploys serve the artifact as-is, but .nojekyll is a
      # cheap guard so the _next/ directory is never Jekyll-processed.
      - name: Disable Jekyll
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
